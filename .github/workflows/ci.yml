name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -ldflags "-X github.com/datagendev/datagen-cli/internal/version.Version=${{ github.ref_name }}" -o datagen${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Smoke test
        run: ./datagen${{ matrix.os == 'windows-latest' && '.exe' || '' }} --help

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...

  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build all platforms
        env:
          LDFLAGS: "-X github.com/datagendev/datagen-cli/internal/version.Version=${{ github.ref_name }}"
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o datagen-darwin-arm64
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o datagen-darwin-amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o datagen-linux-amd64
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o datagen-linux-arm64
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o datagen-windows-amd64.exe
