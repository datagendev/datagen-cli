name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race ./...

      - name: Build binary
        run: go build -o datagen${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Smoke test
        run: ./datagen${{ matrix.os == 'windows-latest' && '.exe' || '' }} --help

  vet:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all platforms
        run: |
          GOOS=darwin GOARCH=arm64 go build -o datagen-darwin-arm64
          GOOS=darwin GOARCH=amd64 go build -o datagen-darwin-amd64
          GOOS=linux GOARCH=amd64 go build -o datagen-linux-amd64
          GOOS=linux GOARCH=arm64 go build -o datagen-linux-arm64
          GOOS=windows GOARCH=amd64 go build -o datagen-windows-amd64.exe
